# Banco de dados — valores vêm de variáveis de ambiente do Railway
spring.datasource.url=jdbc:${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Porta — o Railway injeta a porta automaticamente
server.port=${PORT:8080}

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html

spring.application.name=api-bank





# Define o tempo máximo de vida da conexão no pool para 1 minuto e meio (90.000 ms)
# Deve ser menor que o timeout de ociosidade do MySQL no Railway
spring.datasource.hikari.max-lifetime=90000

# Se uma conexão ficar ociosa por 1 minuto (60.000 ms), o Hikari a encerra suavemente
spring.datasource.hikari.idle-timeout=60000

# Mantém um número mínimo de conexões prontas para resposta rápida
spring.datasource.hikari.minimum-idle=2

# Limite máximo de conexões simultâneas no pool
spring.datasource.hikari.maximum-pool-size=10

# Executa uma query leve para validar a conexão antes de entregá-la ao Hibernate
spring.datasource.hikari.connection-test-query=SELECT 1

# Ensina o Spring Boot a respeitar o protocolo HTTPS vindo do proxy do Railway
server.forward-headers-strategy=framework