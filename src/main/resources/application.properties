# Conexão com o MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/financas_db
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Nome da aplicação
spring.application.name=financas-api

# Porta do servidor (padrão é 8080)
server.port=8080

spring.mvc.pathmatch.matching-strategy=ant_path_matcher

jwt.secret=4f7a93b2d6e1f8c7a5b3e2d1f0c9b8a7f6e5d4c3b2a10f9e8d7c6b5a4f3e2d1c
jwt.expiration=86400000